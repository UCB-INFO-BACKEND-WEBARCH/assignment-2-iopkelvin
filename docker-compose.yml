services:
  app:
    build: .
    command: sh -c "sleep 5 && python app.py"
    ports:
      - "5001:5000"
    environment:
      - REDIS_HOST=redis
      - DATABASE_URL=postgresql://postgres:password@db:5432/tasks
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tasks
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7

  worker:
    build: .
    command: sh -c "sleep 5 && rq worker"
    environment:
      - REDIS_HOST=redis
      - DATABASE_URL=postgresql://postgres:password@db:5432/tasks
    depends_on:
      - redis
      - db

volumes:
  pgdata: