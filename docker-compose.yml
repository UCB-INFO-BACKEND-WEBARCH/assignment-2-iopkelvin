version: "3.9"

services:
  app:
    build: .
    ports:
      - "5000:5001"
    environment:
      - REDIS_HOST=redis
      - DATABASE_URL=postgresql://postgres:password@db:5432/tasks
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7

  worker:
    build: .
    command: rq worker
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis

volumes:
  pgdata: